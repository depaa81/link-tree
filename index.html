<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Linktree</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom right, #3b82f6, #ffffff);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white px-4">

  <!-- Kontainer -->
  <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 w-full max-w-sm text-center shadow-xl">
    <img src="https://files.catbox.moe/ylp3ac.jpeg" alt="Avatar" class="w-24 h-24 rounded-full mx-auto border-4 border-white shadow-md">
    <h1 class="text-2xl font-bold mt-4">NEXA FT CS</h1>
    <p class="text-sm text-gray-200">OPEN FT CS RECEH BY NEXA.</p>

    <div class="mt-6 space-y-3">
      <a href="https://chat.whatsapp.com/INSxggxkh5bJ192fQD1q3Y?mode=gi_t" class="block bg-white/20 hover:bg-white/30 transition rounded-lg py-3 font-medium">
        GB FT RECEH BY NEXA
      </a>
      <a href="https://wa.me/62856935420228" class="block bg-white/20 hover:bg-white/30 transition rounded-lg py-3 font-medium">
        WhatsApp
        <a href="https://wa.me/6285693542022" class="block bg-white/20 hover:bg-white/30 transition rounded-lg py-3 font-medium">
        WhatsApp (Cadangan)
              <a href="https://tiktok.com/@nexa_ftcs" class="block bg-white/20 hover:bg-white/30 transition rounded-lg py-3 font-medium">
        TikTok
      </a>
      </a>
    </div>

    <!-- Tombol Music -->
    <button id="music-btn" class="mt-6 w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg font-medium transition">
      🎵 Play Music
    </button>
  </div>

  <!-- Audio -->
  <audio id="bg-music" src="music.mp3" loop></audio> 
  <!-- ganti 'music.mp3' dengan link musik kamu -->

  <script>
    const musicBtn = document.getElementById('music-btn');
    const audio = document.getElementById('bg-music');
    let isPlaying = false;

    musicBtn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        musicBtn.textContent = "🎵 Play Music";
        isPlaying = false;
      } else {
        audio.play().catch(err => console.log('Audio play blocked:', err));
        musicBtn.textContent = "⏸ Pause Music";
        isPlaying = true;
      }
    });
  </script>

</body>
</html>
